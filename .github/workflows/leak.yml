name: leak check

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  scan:
    name: secret scan (self-hosted)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Make script executable
        run: chmod +x .github/scripts/secret-scan.sh

      - name: Scan working tree
        run: .github/scripts/secret-scan.sh tree

      - name: Scan full history
        run: .github/scripts/secret-scan.sh history
