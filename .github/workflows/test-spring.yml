name: test core

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  spring-core:
    name: SpringCoreTest (javasec-1.15.jar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up java 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: download test file
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q https://raw.githubusercontent.com/jar-analyzer/test/refs/heads/main/javasec-1.15.jar -O javasec-1.15.jar
      - name: run maven core test
        run: mvn -B test -Dtest=SpringCoreTest#testRun -DfailIfNoTests=true
      - name: upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-spring-core
          path: target/surefire-reports/
          if-no-files-found: ignore
      - name: clean test file
        if: always()
        run: rm -f javasec-1.15.jar jar-analyzer.db

  spring-custom:
    name: SpringCustomTest (test-0.0.1-SNAPSHOT.jar)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: set up java 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - name: download test file
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -q https://github.com/4ra1n/test-springboot/releases/download/0.0.1/test-0.0.1-SNAPSHOT.jar -O test-0.0.1-SNAPSHOT.jar
      - name: run maven custom test
        run: mvn -B test -Dtest=SpringCustomTest#testRun -DfailIfNoTests=true
      - name: upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-spring-custom
          path: target/surefire-reports/
          if-no-files-found: ignore
      - name: clean test file
        if: always()
        run: rm -f test-0.0.1-SNAPSHOT.jar jar-analyzer.db
